<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mountain Goats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Header with dice pool and game status -->
        <div id="game-header">
            <div id="dice-pool">
                <div class="dice-token" data-value="5">
                    <div class="dice-number">5</div>
                    <div class="dice-count">× <span id="dice-5-count">10</span></div>
                </div>
                <div class="dice-token" data-value="6">
                    <div class="dice-number">6</div>
                    <div class="dice-count">× <span id="dice-6-count">9</span></div>
                </div>
                <div class="dice-token" data-value="7">
                    <div class="dice-number">7</div>
                    <div class="dice-count">× <span id="dice-7-count">8</span></div>
                </div>
                <div class="dice-token" data-value="8">
                    <div class="dice-number">8</div>
                    <div class="dice-count">× <span id="dice-8-count">7</span></div>
                </div>
                <div class="dice-token" data-value="9">
                    <div class="dice-number">9</div>
                    <div class="dice-count">× <span id="dice-9-count">6</span></div>
                </div>
                <div class="dice-token" data-value="10">
                    <div class="dice-number">10</div>
                    <div class="dice-count">× <span id="dice-10-count">5</span></div>
                </div>
            </div>
            <div id="game-status">
                <div id="current-player">Current Turn: <span id="current-player-name">Player 1</span></div>
                <div id="game-message">Select a die and click a goat to move</div>
            </div>
        </div>

        <!-- Main game board -->
        <div id="game-board">
            <!-- Mountains will be generated by JS -->
        </div>

        <!-- Player panels -->
        <div id="player-panels">
            <!-- Players will be generated by JS -->
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
